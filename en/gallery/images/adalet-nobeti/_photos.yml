# Justice Vigil photo archive — _photos.yml
#
# To add a new photo, copy the example below under `photos:`. Place the
# image file in this folder (en/gallery/images/adalet-nobeti/). Copy
# the same file into tr/gallery/images/adalet-nobeti/ so both
# languages share it.
#
# Fields:
#   file     : Image filename (relative to this folder)
